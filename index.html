<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plan de Gastos Personal</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#080b10;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      font-family:'Share Tech Mono',monospace;overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(0,212,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03)1px,transparent 1px);
      background-size:40px 40px;pointer-events:none;
    }
    body::after{
      content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07)2px,rgba(0,0,0,.07)4px);
      pointer-events:none;
    }
    .box{
      position:relative;z-index:2;
      background:#0d1117;border:1px solid #1e3a4a;border-radius:6px;
      padding:48px 40px;width:min(420px,90vw);text-align:center;
      box-shadow:0 0 60px rgba(0,212,255,.06);
      animation:fadeIn .6s ease;
    }
    .box::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,#00d4ff,transparent)}
    .icon{font-size:36px;margin-bottom:20px;filter:drop-shadow(0 0 8px rgba(0,212,255,.5))}
    .tag{font-size:9px;letter-spacing:4px;color:#3d6070;text-transform:uppercase;margin-bottom:10px}
    h1{
      font-family:'Orbitron',monospace;font-size:clamp(16px,4vw,22px);
      font-weight:900;letter-spacing:3px;
      background:linear-gradient(135deg,#fff,#00d4ff,#fff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;margin-bottom:8px;
    }
    .sub{font-size:10px;color:#3d6070;letter-spacing:2px;margin-bottom:32px}
    .inp-wrap{position:relative;margin-bottom:14px}
    input{
      width:100%;padding:14px 46px 14px 16px;
      background:#111820;border:1px solid #1e3a4a;border-radius:4px;
      color:#e8f4f8;font-family:'Share Tech Mono',monospace;
      font-size:15px;letter-spacing:3px;outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input:focus{border-color:#00d4ff;box-shadow:0 0 0 2px rgba(0,212,255,.12)}
    input.err{border-color:#ff3a5c;box-shadow:0 0 0 2px rgba(255,58,92,.12);animation:shake .35s ease}
    .eye{
      position:absolute;right:13px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      color:#3d6070;font-size:16px;transition:color .2s;padding:4px;
    }
    .eye:hover{color:#00d4ff}
    .btn{
      width:100%;padding:14px;background:transparent;
      border:1px solid #00d4ff;border-radius:4px;color:#00d4ff;
      font-family:'Orbitron',monospace;font-size:11px;
      font-weight:700;letter-spacing:4px;text-transform:uppercase;
      cursor:pointer;transition:background .2s,box-shadow .2s;
    }
    .btn:hover{background:rgba(0,212,255,.08);box-shadow:0 0 20px rgba(0,212,255,.15)}
    .btn:active{transform:scale(.98)}
    .errmsg{margin-top:12px;font-size:10px;letter-spacing:2px;color:#ff3a5c;text-transform:uppercase;opacity:0;transition:opacity .2s;min-height:14px}
    .errmsg.show{opacity:1}
    .hint{margin-top:22px;font-size:9px;color:#1e3a4a;letter-spacing:1.5px}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="box">
  <div class="icon">🔐</div>
  <div class="tag">// Acceso restringido</div>
  <h1>Plan de Gastos</h1>
  <div class="sub">Ingresa tu contrasena para continuar</div>
  <div class="inp-wrap">
    <input type="password" id="pwd" placeholder="Contrasena" autocomplete="current-password" autofocus/>
    <button class="eye" id="eyeBtn" type="button">👁</button>
  </div>
  <button class="btn" id="enterBtn">Acceder →</button>
  <div class="errmsg" id="err">Contrasena incorrecta</div>
  <div class="hint">Solo personas autorizadas pueden ver este contenido</div>
</div>

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function unlock() {
  const val = document.getElementById('pwd').value;
  if (!val) return;
  const hash = await sha256(val);
  if (hash === HASH_CORRECTO) {
    const decoded = atob(PAGE);
    document.open(); document.write(decoded); document.close();
  } else {
    const inp = document.getElementById('pwd');
    const err = document.getElementById('err');
    inp.classList.remove('err');
    void inp.offsetWidth;
    inp.classList.add('err');
    err.classList.add('show');
    inp.value = ''; inp.focus();
    setTimeout(() => inp.classList.remove('err'), 400);
  }
}

document.getElementById('enterBtn').addEventListener('click', unlock);
document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
  document.getElementById('err').classList.remove('show');
});
document.getElementById('eyeBtn').addEventListener('click', () => {
  const i = document.getElementById('pwd');
  i.type = i.type === 'password' ? 'text' : 'password';
});
</script>
