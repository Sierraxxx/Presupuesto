<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Plan de Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#060911;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,240,.022)1px,transparent 1px),linear-gradient(90deg,rgba(0,200,240,.022)1px,transparent 1px);background-size:48px 48px;pointer-events:none}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,200,240,.05),transparent 60%);pointer-events:none}
.box{position:relative;z-index:2;background:#0b0f1a;border:1px solid #1a2840;border-radius:8px;padding:52px 44px;width:min(440px,92vw);text-align:center;box-shadow:0 0 80px rgba(0,200,240,.07);animation:up .5s ease}
.box::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00c8f0,transparent);border-radius:8px 8px 0 0}
.icon{font-size:32px;margin-bottom:22px;filter:drop-shadow(0 0 10px rgba(0,200,240,.5))}
.tag{font-size:8.5px;letter-spacing:4px;color:#2a3848;text-transform:uppercase;margin-bottom:12px}
.ttl{font-family:'Orbitron',monospace;font-size:clamp(16px,4vw,22px);font-weight:900;letter-spacing:4px;background:linear-gradient(120deg,#fff,#00c8f0,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.sub{font-size:10px;color:#2a3848;letter-spacing:2px;margin-bottom:36px}
.iw{position:relative;margin-bottom:14px}
input{width:100%;padding:13px 46px 13px 16px;background:#101624;border:1px solid #1a2840;border-radius:5px;color:#eef4f8;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:3px;outline:none;transition:border-color .18s,box-shadow .18s}
input:focus{border-color:#00c8f0;box-shadow:0 0 0 2px rgba(0,200,240,.1)}
input.err{border-color:#ff4060;animation:shake .3s ease}
.eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#2a3848;font-size:15px;padding:4px;transition:color .18s}
.eye:hover{color:#00c8f0}
.btn{width:100%;padding:13px;background:transparent;border:1px solid #00c8f0;border-radius:5px;color:#00c8f0;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:all .18s;margin-bottom:12px}
.btn:hover{background:rgba(0,200,240,.09);box-shadow:0 0 24px rgba(0,200,240,.15)}
.btn:active{transform:scale(.98)}
.errmsg{font-size:9.5px;letter-spacing:2px;color:#ff4060;text-transform:uppercase;opacity:0;transition:opacity .2s;min-height:14px}
.errmsg.on{opacity:1}
.hint{margin-top:20px;font-size:8.5px;color:#1a2840;letter-spacing:1.5px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="box" id="lockBox">
  <div class="icon">&#128272;</div>
  <div class="tag">// Datos cifrados</div>
  <div class="ttl">Plan de Gastos</div>
  <div class="sub">Ingresa tu contrasena para descifrar</div>
  <div class="iw">
    <input type="password" id="p" placeholder="Contrasena" autocomplete="off" autofocus/>
    <button class="eye" id="ey">&#128065;</button>
  </div>
  <button class="btn" id="ok">Descifrar y entrar</button>
  <div class="errmsg" id="em">Contrasena incorrecta</div>
  <div class="hint">Tus datos estan cifrados. Sin la contrasena no se pueden leer.</div>
</div>

function appHTML(){return `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plan de Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#060911;--bg1:#0b0f1a;--bg2:#101624;--bg3:#141b28;
  --b0:#1a2840;--b1:#1f3050;
  --cyan:#00c8f0;--green:#00e87a;--red:#ff4060;--gold:#f0b030;--purple:#a060f0;
  --t0:#eef4f8;--t1:#8aaabb;--t2:#4a6070;--t3:#2a3848;
  --fm:'JetBrains Mono',monospace;--fd:'Orbitron',monospace;--fs:'Inter',sans-serif;
  --gc:0 0 12px rgba(0,200,240,.3),0 0 32px rgba(0,200,240,.1);
  --gg:0 0 12px rgba(0,232,122,.3),0 0 32px rgba(0,232,122,.1);
  --gr:0 0 12px rgba(255,64,96,.3),0 0 32px rgba(255,64,96,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg0);color:var(--t0);font-family:var(--fs);font-size:15px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 90% 50% at 15% 0%,rgba(0,200,240,.04),transparent 55%),radial-gradient(ellipse 70% 40% at 85% 100%,rgba(0,232,122,.03),transparent 55%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,240,.022)1px,transparent 1px),linear-gradient(90deg,rgba(0,200,240,.022)1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:44px 20px 100px}

/* HEADER */
.hdr{text-align:center;margin-bottom:44px}
.hdr-eyebrow{font-family:var(--fm);font-size:9px;letter-spacing:5px;color:var(--cyan);text-transform:uppercase;opacity:.55;margin-bottom:14px}
.hdr-title{font-family:var(--fd);font-size:clamp(24px,5.5vw,40px);font-weight:900;letter-spacing:5px;background:linear-gradient(120deg,#c8e8f0 0%,var(--cyan) 40%,#c8e8f0 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:10px}
.hdr-sub{font-family:var(--fm);font-size:10px;color:var(--t2);letter-spacing:3px}
.hdr-rule{width:220px;height:1px;margin:20px auto 0;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:gp 3s ease-in-out infinite}
@keyframes gp{0%,100%{opacity:.25}50%{opacity:.8}}

/* PDF */
.export-bar{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:36px}
.export-lbl{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-right:4px}
.pdf-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:transparent;border:1px solid var(--b1);border-radius:5px;color:var(--t2);font-family:var(--fm);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.pdf-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8}
.pdf-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,200,240,.05)}
.pdf-btn-both{border-color:rgba(0,232,122,.3);color:var(--green)}
.pdf-btn-both:hover{border-color:var(--green);color:var(--green);background:rgba(0,232,122,.05)}
@media(max-width:540px){.export-bar{flex-direction:column;gap:8px}.export-lbl{margin-bottom:2px}.pdf-btn{width:100%;justify-content:center}}

/* TABS */
.tabs{display:flex;background:var(--bg1);border:1px solid var(--b0);border-radius:7px;overflow:hidden;margin-bottom:32px}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:15px 12px;background:transparent;border:none;cursor:pointer;font-family:var(--fm);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t2);transition:all .2s;position:relative;user-select:none}
.tab:not(:last-child){border-right:1px solid var(--b0)}
.tab svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.7;flex-shrink:0;opacity:.7}
.tab:hover:not(.on){color:var(--t1);background:rgba(255,255,255,.02)}
.tab.on{color:var(--cyan);background:rgba(0,200,240,.06)}
.tab.on svg{opacity:1}
.tab.on::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);border-radius:2px}
.tab-panel{display:none}
.tab-panel.on{display:block;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SECTION */
.sec{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.sec-t{font-family:var(--fm);font-size:9px;letter-spacing:4px;color:var(--cyan);text-transform:uppercase;white-space:nowrap}
.sec-l{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,200,240,.2),transparent)}

/* PANEL */
.panel{background:var(--bg1);border:1px solid var(--b0);border-radius:7px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:linear-gradient(180deg,var(--cyan),rgba(0,200,240,.1))}

/* INGRESOS */
.ingrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:540px){.ingrid{grid-template-columns:1fr 1fr}}
.ing-c{background:var(--bg2);border:1px solid var(--b0);border-radius:5px;padding:16px 18px;transition:border-color .2s}
.ing-c:hover{border-color:var(--b1)}
.ing-c.ing-tot{border-color:rgba(0,232,122,.2);background:rgba(0,232,122,.025)}
@media(max-width:540px){.ing-c.ing-tot{grid-column:1/-1}}
.ing-lbl{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-bottom:10px}
.ing-v{font-family:var(--fm);font-size:clamp(17px,3vw,23px);color:var(--green);text-shadow:var(--gg);line-height:1;min-height:28px}
.ing-sub{font-family:var(--fs);font-size:11px;color:var(--t2);margin-top:7px}

/* EDITABLE */
[contenteditable]{outline:none;cursor:text;border-radius:3px;transition:background .15s}
[contenteditable]:hover{background:rgba(0,200,240,.04)}
[contenteditable]:focus{background:rgba(0,200,240,.07);outline:1px dashed rgba(0,200,240,.35);outline-offset:2px}
.ing-tot [contenteditable]{pointer-events:none;outline:none!important;background:none!important;cursor:default}

/* TABLA */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:5px;border:1px solid var(--b0)}
table{width:100%;border-collapse:collapse}
table thead tr{background:rgba(0,200,240,.04)}
table thead th{padding:12px 16px;text-align:left;font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--b0)}
table thead th.r{text-align:right} table thead th.c{text-align:center}
table tbody tr{border-bottom:1px solid rgba(26,40,64,.5);transition:background .15s}
table tbody tr:last-child{border-bottom:none}
table tbody tr:hover{background:rgba(0,200,240,.025)}
table tbody td{padding:12px 16px;vertical-align:middle}
table td.r{text-align:right;font-family:var(--fm);font-size:13px}
table td.c{text-align:center}
.cat-n{font-weight:600;font-size:14px;color:var(--t0)}
.cat-d{font-size:11px;color:var(--t2);margin-top:3px;font-weight:400}
.v-act{color:var(--t1);font-family:var(--fm);font-size:13px}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:30px;font-family:var(--fm);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.bm{background:rgba(0,200,240,.09);color:var(--cyan);border:1px solid rgba(0,200,240,.18)}
.br{background:rgba(240,176,48,.09);color:var(--gold);border:1px solid rgba(240,176,48,.18)}
.be{background:rgba(255,64,96,.09);color:var(--red);border:1px solid rgba(255,64,96,.18)}
.vn{font-family:var(--fm);font-size:13px}
.vn.m{color:var(--cyan);text-shadow:var(--gc)}
.vn.r{color:var(--gold)}
.vn.e{color:var(--red)}

/* MOB CARDS */
.mob-cards{display:none}
.mob-c{background:var(--bg2);border:1px solid var(--b0);border-radius:5px;padding:15px 16px;margin-bottom:10px;position:relative;overflow:hidden}
.mob-c::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%}
.mob-c.mantiene::before{background:var(--cyan)}
.mob-c.reduce::before{background:var(--gold)}
.mob-c.elimina::before{background:var(--red)}
.mob-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px}
.mob-vrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mv-l{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-bottom:5px}
.mv-v{font-family:var(--fm);font-size:18px}
.mv-a{color:var(--t1)}
.mv-m{color:var(--cyan);text-shadow:var(--gc)}
.mv-r{color:var(--gold)}
.mv-e{color:var(--red)}

/* TOTALES */
.totrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:22px}
@media(max-width:460px){.totrow{grid-template-columns:1fr 1fr}.totrow .ts{grid-column:1/-1}}
.tot-b{background:var(--bg2);border:1px solid var(--b0);border-radius:5px;padding:16px 18px;text-align:center}
.tot-l{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-bottom:9px}
.tot-v{font-family:var(--fm);font-size:clamp(16px,3vw,20px);line-height:1}
.ta{border-top:2px solid var(--red)}   .ta .tot-v{color:var(--red)}
.tn{border-top:2px solid var(--cyan)}  .tn .tot-v{color:var(--cyan);text-shadow:var(--gc)}
.ts{border-top:2px solid var(--green);background:rgba(0,232,122,.025)} .ts .tot-v{color:var(--green);text-shadow:var(--gg)}
.anual-b{margin-top:14px;padding:16px 22px;background:linear-gradient(135deg,rgba(0,232,122,.05),rgba(0,200,240,.03));border:1px solid rgba(0,232,122,.18);border-radius:5px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px}
.anual-l{font-family:var(--fm);font-size:8.5px;letter-spacing:2px;color:var(--green);text-transform:uppercase}

/* CHARTS */
.chart-row{display:grid;grid-template-columns:3fr 2fr;gap:20px}
@media(max-width:620px){.chart-row{grid-template-columns:1fr}}
.chart-b{background:var(--bg2);border:1px solid var(--b0);border-radius:5px;padding:20px}
.chart-l{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-bottom:18px}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.blbl{font-family:var(--fm);font-size:8.5px;color:var(--t1);width:82px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.btrk{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;width:0;transition:width .9s cubic-bezier(.22,1,.36,1)}
.bamt{font-family:var(--fm);font-size:8.5px;color:var(--t2);width:60px;flex-shrink:0}
.dbox{display:flex;flex-direction:column;align-items:center;gap:14px}
.dleg{display:flex;flex-wrap:wrap;gap:7px 12px;justify-content:center}
.dl-i{display:flex;align-items:center;gap:5px;font-family:var(--fm);font-size:8px;color:var(--t1)}
.dl-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* SEMANAL */
.wk-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px}
.wk-range{font-family:var(--fd);font-size:clamp(11px,2.5vw,13px);letter-spacing:2px;color:var(--cyan);text-shadow:var(--gc)}
.wk-arrows{display:flex;gap:8px}
.wk-a{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--b0);border-radius:5px;color:var(--t1);font-family:var(--fm);font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;padding:9px 16px;cursor:pointer;transition:all .18s;user-select:none}
.wk-a:hover{border-color:var(--cyan);color:var(--cyan)}

/* Form */
.wk-form{display:grid;grid-template-columns:2fr 1.2fr 1.4fr auto;gap:12px;align-items:end;margin-bottom:22px}
@media(max-width:580px){.wk-form{grid-template-columns:1fr 1fr}.add-btn{grid-column:1/-1}}
.fl{display:flex;flex-direction:column;gap:5px}
.fl-l{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--t2);text-transform:uppercase}
.fi{background:var(--bg2);border:1px solid var(--b0);border-radius:5px;color:var(--t0);font-family:var(--fm);font-size:13px;padding:10px 13px;outline:none;width:100%;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,200,240,.1)}
.fi::placeholder{color:var(--t3)}

.add-btn{display:flex;align-items:center;justify-content:center;gap:7px;background:rgba(0,200,240,.09);border:1px solid rgba(0,200,240,.25);border-radius:5px;color:var(--cyan);font-family:var(--fm);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:10px 18px;cursor:pointer;transition:all .18s;white-space:nowrap;height:42px}
.add-btn:hover{background:rgba(0,200,240,.16);box-shadow:var(--gc)}
.add-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.2;flex-shrink:0}

/* Tabla semanal */
table.wt thead th{color:var(--purple)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--t3);width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;transition:all .18s}
.del-btn:hover{background:rgba(255,64,96,.12);color:var(--red)}
.wk-empty{font-family:var(--fm);font-size:10px;color:var(--t2);text-align:center;padding:32px 20px;letter-spacing:2px}

/* Recuadros por dia */
#days-container{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){#days-container{grid-template-columns:1fr}}
.day-box{background:var(--bg2);border:1px solid var(--b0);border-radius:6px;overflow:hidden;position:relative}
.day-box::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--purple)}
.day-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 16px;background:rgba(160,96,240,.06);border-bottom:1px solid var(--b0)}
.day-name{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:var(--purple);text-transform:uppercase}
.day-total{font-family:var(--fm);font-size:13px;color:var(--t0)}
.day-items{padding:6px 0}
.day-item{display:flex;align-items:center;gap:10px;padding:8px 16px;transition:background .15s}
.day-item:hover{background:rgba(160,96,240,.04)}
.day-item-desc{flex:1;font-family:var(--fs);font-size:13px;font-weight:500;color:var(--t0);min-width:0}
.day-item-cat{font-family:var(--fm);font-size:7.5px;letter-spacing:1px;color:var(--purple);text-transform:uppercase;padding:2px 7px;background:rgba(160,96,240,.1);border:1px solid rgba(160,96,240,.18);border-radius:20px;white-space:nowrap;flex-shrink:0}
.day-item-val{font-family:var(--fm);font-size:13px;color:var(--t1);width:72px;text-align:right;flex-shrink:0}
.day-item-ing{background:rgba(0,232,122,.04)}
.day-item-cat.ing{color:var(--green);background:rgba(0,232,122,.1);border-color:rgba(0,232,122,.2)}
.day-item-val.ing{color:var(--green);font-weight:600}
.day-item .del-btn{flex-shrink:0}

/* Totales semana */
.wk-tots{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px}
@media(max-width:580px){.wk-tots{grid-template-columns:1fr 1fr}}
.wt-b{background:var(--bg2);border:1px solid var(--b0);border-radius:5px;padding:14px 16px;text-align:center}
.wt-l{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-bottom:7px}
.wt-v{font-family:var(--fm);font-size:clamp(14px,2.5vw,18px);line-height:1}
.wt-b.wo{border-top:2px solid var(--red)}    .wo .wt-v{color:var(--red)}
.wt-b.wg{border-top:2px solid var(--gold)}   .wg .wt-v{color:var(--gold)}
.wt-b.wp{border-top:2px solid var(--green)}  .wp .wt-v{color:var(--green)}
.wt-b.wr{border-top:2px solid var(--cyan)}   .wr .wt-v{color:var(--cyan);text-shadow:var(--gc)}

/* Flujo de caja diario */
.flow-saldo-ini{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:14px 18px;background:rgba(0,200,240,.05);border:1px solid rgba(0,200,240,.2);border-radius:5px}
.fsi-lbl{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase}
.fsi-val{font-family:var(--fm);font-size:clamp(15px,3vw,19px);color:var(--cyan);text-shadow:var(--gc)}
table.ft thead th{color:var(--green)}
table.ft tbody td{font-family:var(--fm);font-size:13px}
table.ft .day-cell{font-family:var(--fd);font-size:10px;letter-spacing:1px;color:var(--green);text-transform:uppercase}
table.ft .ingreso-cell{color:var(--green)}
table.ft .gasto-cell{color:var(--red)}
table.ft .saldo-ini-cell{color:var(--t1)}

table.ft tbody tr.neg .saldo-fin-cell{color:var(--red)}
.flow-end{margin-top:14px;padding:16px 20px;border-radius:5px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(135deg,rgba(0,200,240,.06),rgba(0,232,122,.04));border:1px solid rgba(0,200,240,.2)}
.flow-end.neg{background:linear-gradient(135deg,rgba(255,64,96,.07),rgba(255,64,96,.03));border-color:rgba(255,64,96,.25)}

.flow-end-val{font-family:var(--fd);font-size:clamp(16px,3.5vw,22px);font-weight:900;color:var(--cyan);text-shadow:var(--gc)}

/* Conclusiones */
.concl-box{display:flex;flex-direction:column;gap:12px}
.concl-item{background:var(--bg2);border:1px solid var(--b0);border-radius:6px;padding:16px 18px;position:relative;overflow:hidden}
.concl-item::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--cyan)}
.concl-q{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.concl-num{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--cyan);flex-shrink:0;line-height:1.4}
.concl-qtext{font-family:var(--fs);font-size:14px;font-weight:600;color:var(--t0);line-height:1.4}
.concl-calc{font-family:var(--fs);font-size:13.5px;color:var(--t1);background:rgba(0,232,122,.04);border:1px solid rgba(0,232,122,.14);border-radius:4px;padding:11px 14px;line-height:1.6}
.concl-calc .hl{color:var(--cyan);font-weight:600;font-family:var(--fm);font-size:13px}

/* PRINT */
@media print{
  .tabs,.export-bar,body::before,body::after,.wk-form,.wk-arrows,.del-btn{display:none!important}
  body{background:#fff!important;color:#111!important}
  .page{padding:10px!important;max-width:100%!important}
  .panel,.chart-b,.wt-b,.tot-b,.ing-c,.mob-c{border:1px solid #e0e0e0!important;background:#fff!important}

  .hdr-title{color:#111!important;-webkit-text-fill-color:#111!important;background:none!important}
  .ing-v,.tot-v,.anual-v,.wt-v,.vn{color:#111!important;text-shadow:none!important}
  .fsi-val,.flow-end-val,table.ft .saldo-fin-cell,table.ft .day-cell{color:#111!important;text-shadow:none!important}

  .concl-qtext,.concl-num{color:#111!important}
  .concl-calc{background:#f0fff4!important;border-color:#ccc!important;color:#333!important}
  .concl-calc .hl{color:#0a5a8a!important}
  .badge{border:1px solid #ccc!important;color:#444!important;background:#f5f5f5!important}
  table tbody tr:hover{background:transparent!important}
  table tbody tr:nth-child(even){background:#fafafa!important}
  .sec-t{color:#444!important}
  .anual-b{background:#f0fff4!important;border-color:#ccc!important}

  /* Exportar SOLO MES: muestra panel mensual, oculta semanal */
  body.print-mes #tm{display:block!important}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}

.wk-sel:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,200,240,.1)}
.wk-sel:hover{border-color:var(--cyan)}

<script>

/* ════════════════════════════════════════════════════════
   APP — lee los datos de window.DATOS (definido tras descifrar)
   ════════════════════════════════════════════════════════ */
const CL=['#00c8f0','#00e87a','#f0b030','#a060f0','#ff4060','#00a0c0','#00c060','#d09030','#8848d8','#d04050','#40d0f0','#48f098'];
const $=id=>document.getElementById(id);
const fmt=v=>'$'+Math.round(v).toLocaleString('es-CO').replace(/,/g,'.');
const BC={mantiene:'bm',reduce:'br',elimina:'be'};
const BL={mantiene:'Mantiene',reduce:'Reduce',elimina:'Elimina'};
const NOM={Lun:'Lunes',Mar:'Martes',Mie:'Miercoles',Jue:'Jueves',Vie:'Viernes',Sab:'Sabado',Dom:'Domingo'};
const ORD={Lun:1,Mar:2,Mie:3,Jue:4,Vie:5,Sab:6,Dom:7};

let D, semanaActual=0;

/* ════ ARRANQUE (se llama tras descifrar) ════ */

  D = datos;

/* ════ INGRESOS ════ */
function renderIngresos(){
  const grid=$('ingrid'); grid.innerHTML='';
  let total=0;
  D.ingresos.forEach(i=>{
    total+=i.valor;
    const c=document.createElement('div');

    c.innerHTML=\`<div class="ing-lbl">\${i.nombre}</div><div class="ing-v">\${fmt(i.valor)}</div><div class="ing-sub">\${i.nota||''}</div>\`;

  const t=document.createElement('div');
  t.className='ing-c ing-tot';
  t.innerHTML=\`<div class="ing-lbl">Total Ingresos</div><div class="ing-v">\${fmt(total)}</div><div class="ing-sub">Suma de todas las fuentes</div>\`;
  grid.appendChild(t);
}

/* ════ MENSUAL ════ */
function renderMensual(){
  let tA=0,tV=0; const cD=[];
  const tbm=$('tbm'),mobm=$('mobm');
  tbm.innerHTML=''; mobm.innerHTML='';
  D.gastosMes.forEach((g,i)=>{
    tA+=g.actual; tV+=g.nuevo;
    if(g.nuevo>0) cD.push({n:g.nombre,v:g.nuevo,c:CL[i%CL.length]});
    const vcl=g.accion==='mantiene'?'m':g.accion==='reduce'?'r':'e';
    const mcl=g.accion==='mantiene'?'mv-m':g.accion==='reduce'?'mv-r':'mv-e';
    const tr=document.createElement('tr');
    tr.innerHTML=\`<td><div class="cat-n">\${g.nombre}</div><div class="cat-d">\${g.desc}</div></td><td class="r v-act">\${fmt(g.actual)}</td><td class="c"><span class="badge \${BC[g.accion]}">\${BL[g.accion]}</span></td><td class="r"><span class="vn \${vcl}">\${fmt(g.nuevo)}</span></td>\`;
    tbm.appendChild(tr);
    const card=document.createElement('div');
    card.className='mob-c '+g.accion;
    card.innerHTML=\`<div class="mob-top"><div><div class="cat-n">\${g.nombre}</div><div class="cat-d">\${g.desc}</div></div><span class="badge \${BC[g.accion]}">\${BL[g.accion]}</span></div><div class="mob-vrow"><div><div class="mv-l">Valor Actual</div><div class="mv-v mv-a">\${fmt(g.actual)}</div></div><div><div class="mv-l">Nuevo Valor</div><div class="mv-v \${mcl}">\${fmt(g.nuevo)}</div></div></div>\`;
    mobm.appendChild(card);
  });
  const ah=tA-tV;
  $('tta').textContent=fmt(tA);$('ttn').textContent=fmt(tV);$('tts').textContent=fmt(ah);$('tanual').textContent=fmt(ah*12);

  /* Bar chart */
  const bcm=$('bcm');bcm.innerHTML='';
  const mx=Math.max(...cD.map(g=>g.v),1);
  cD.forEach(g=>{
    const r=document.createElement('div');r.className='brow';
    r.innerHTML=\`<div class="blbl" title="\${g.n}">\${g.n}</div><div class="btrk"><div class="bfill" data-p="\${(g.v/mx*100).toFixed(1)}" style="background:\${g.c};box-shadow:0 0 5px \${g.c}44"></div></div><div class="bamt">\${fmt(g.v)}</div>\`;
    bcm.appendChild(r);
  });
  requestAnimationFrame(()=>setTimeout(()=>document.querySelectorAll('.bfill').forEach(e=>e.style.width=e.dataset.p+'%'),200));

  /* Donut */
  const svg=$('donut');svg.innerHTML='';
  const dleg=$('dleg');dleg.innerHTML='';
  const tot=cD.reduce((s,g)=>s+g.v,0);
  const cx=82,cy=82,R=66,strk=22;let st=-Math.PI/2;
  cD.forEach(g=>{
    const ang=(g.v/tot)*2*Math.PI,en=st+ang;
    const x1=cx+R*Math.cos(st),y1=cy+R*Math.sin(st),x2=cx+R*Math.cos(en),y2=cy+R*Math.sin(en);
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',\`M\${cx} \${cy} L\${x1} \${y1} A\${R} \${R} 0 \${ang>Math.PI?1:0} 1 \${x2} \${y2}Z\`);
    p.setAttribute('fill',g.c);p.setAttribute('opacity','0.9');p.style.filter=\`drop-shadow(0 0 4px \${g.c}66)\`;
    svg.appendChild(p);st=en;
    dleg.innerHTML+=\`<div class="dl-i"><div class="dl-d" style="background:\${g.c}"></div>\${g.n}</div>\`;
  });
  const mk=document.createElementNS('http://www.w3.org/2000/svg','circle');
  mk.setAttribute('cx',cx);mk.setAttribute('cy',cy);mk.setAttribute('r',R-strk);mk.setAttribute('fill','#101624');svg.appendChild(mk);
  const txt=(t,y,s,f,b)=>{const e=document.createElementNS('http://www.w3.org/2000/svg','text');e.setAttribute('x',cx);e.setAttribute('y',y);e.setAttribute('text-anchor','middle');e.setAttribute('fill',f);e.setAttribute('font-family','JetBrains Mono,monospace');e.setAttribute('font-size',s);if(b)e.setAttribute('font-weight','700');e.textContent=t;svg.appendChild(e);};
  txt(fmt(tot),cy-4,'10','#00c8f0',true);txt('TOTAL',cy+11,'8','#4a6070',false);
}

/* ════ SELECTOR DE SEMANAS ════ */
function llenarSelector(){

/* ════ SEMANAL ════ */
function renderSemana(){
  const sem=D.semanas[semanaActual]; if(!sem) return;
  const gs=sem.gastos||[];
  const ings=sem.ingresos||[];
  const budget=sem.presupuesto||0;
  const saldoIni=sem.saldoInicial||0;

  $('wkr').textContent=sem.etiqueta;

  /* Recuadros por dia */
  const cont=$('days-container'),em=$('wke'),bcs=$('bcs'),bcse=$('bcse');
  cont.innerHTML='';
  if(!gs.length){em.style.display='block';bcs.innerHTML='';bcse.style.display='block';}
  else{
    em.style.display='none';bcse.style.display='none';
    /* Ingresos por dia para mostrarlos dentro del recuadro */
    const ingDia={};ings.forEach(it=>{(ingDia[it.dia]=ingDia[it.dia]||[]).push(it);});
    const porDia={};
    gs.forEach((g,i)=>{(porDia[g.dia]=porDia[g.dia]||[]).push({g,i});});
    /* Dias que tienen algo (gasto o ingreso) */
    const todosDias=new Set([...Object.keys(porDia),...Object.keys(ingDia)]);
    [...todosDias].sort((a,b)=>(ORD[a]||0)-(ORD[b]||0)).forEach(dia=>{
      const items=porDia[dia]||[];
      const ingItems=ingDia[dia]||[];
      const sub=items.reduce((s,o)=>s+o.g.val,0);
      const ingTotal=ingItems.reduce((s,it)=>s+it.val,0);
      const box=document.createElement('div');box.className='day-box';
      let h=\`<div class="day-head"><div class="day-name">\${NOM[dia]||dia}</div><div class="day-total">\${fmt(sub)}</div></div><div class="day-items">\`;
      /* Mostrar ingresos primero (en verde) */
      ingItems.forEach(it=>{ h+=\`<div class="day-item day-item-ing"><span class="day-item-desc">\${it.desc}</span><span class="day-item-cat ing">Ingreso</span><span class="day-item-val ing">+\${fmt(it.val)}</span></div>\`; });
      items.forEach(({g})=>{ h+=\`<div class="day-item"><span class="day-item-desc">\${g.desc}</span><span class="day-item-cat">\${g.cat}</span><span class="day-item-val">\${fmt(g.val)}</span></div>\`; });
      h+=\`</div>\`; box.innerHTML=h; cont.appendChild(box);
    });
    /* Grafica por tipo */
    const cm={};gs.forEach(g=>cm[g.desc]=(cm[g.desc]||0)+g.val);
    const so=Object.entries(cm).sort((a,b)=>b[1]-a[1]),mx2=Math.max(...so.map(c=>c[1]),1);
    bcs.innerHTML='';
    so.forEach(([cat,val],i)=>{
      const r=document.createElement('div');r.className='brow';const c=CL[i%CL.length];
      r.innerHTML=\`<div class="blbl">\${cat}</div><div class="btrk"><div class="bfill" style="width:\${(val/mx2*100).toFixed(1)}%;background:\${c};box-shadow:0 0 5px \${c}44"></div></div><div class="bamt">\${fmt(val)}</div>\`;
      bcs.appendChild(r);
    });
  }

  /* Totales */
  const tot=gs.reduce((s,g)=>s+g.val,0),du=new Set(gs.map(g=>g.dia)).size||1,rem=budget-tot;
  $('wto').textContent=fmt(tot);$('wtg').textContent=fmt(tot/du);$('wtp').textContent=fmt(budget);
  $('wtr').textContent=fmt(Math.abs(rem));
  $('wtr').style.color=rem>=0?'var(--cyan)':'var(--red)';
  $('wrl').textContent=rem>=0?'Disponible':'Excedido';

  $('saldo-ini').textContent=fmt(saldoIni);

  buildFlow(gs,ings,saldoIni);
  buildConcl(gs,ings,saldoIni);
}

/* ════ FLUJO DIARIO ════ */
function buildFlow(gs,ings,saldoIni){
  const body=$('flow-body');body.innerHTML='';
  const gastoDia={};gs.forEach(g=>gastoDia[g.dia]=(gastoDia[g.dia]||0)+g.val);
  const ingDia={};(ings||[]).forEach(it=>ingDia[it.dia]=(ingDia[it.dia]||0)+it.val);
  let saldo=saldoIni;
  [['Lun','Lunes'],['Mar','Martes'],['Mie','Miercoles'],['Jue','Jueves'],['Vie','Viernes'],['Sab','Sabado'],['Dom','Domingo']].forEach(([cod,nom])=>{
    const ingreso=ingDia[cod]||0, gasto=gastoDia[cod]||0, ini=saldo, fin=ini+ingreso-gasto;
    const tr=document.createElement('tr');if(fin<0)tr.className='neg';
    tr.innerHTML=\`<td class="day-cell">\${nom}</td><td class="r saldo-ini-cell">\${fmt(ini)}</td><td class="r ingreso-cell">\${ingreso>0?'+'+fmt(ingreso):fmt(0)}</td><td class="r gasto-cell">\${gasto>0?'-'+fmt(gasto):fmt(0)}</td><td class="r saldo-fin-cell">\${fmt(fin)}</td>\`;
    body.appendChild(tr);saldo=fin;
  });
  const fe=$('flow-end');fe.className='flow-end'+(saldo<0?' neg':'');
  fe.innerHTML=\`<span class="flow-end-lbl">Saldo con el que termino el Domingo</span><span class="flow-end-val">\${fmt(saldo)}</span>\`;
}

/* ════ CONCLUSIONES ════ */
function buildConcl(gs,ings,saldoIni){
  const box=$('concl-box');box.innerHTML='';
  const total=gs.reduce((s,g)=>s+g.val,0);
  const totalIng=(ings||[]).reduce((s,it)=>s+it.val,0);
  const saldoFin=saldoIni+totalIng-total;
  const porTipo={};gs.forEach(g=>porTipo[g.desc]=(porTipo[g.desc]||0)+g.val);
  const tipos=Object.entries(porTipo).sort((a,b)=>b[1]-a[1]);
  const mayorTipo=tipos[0]||['-',0];
  const pctMayor=total>0?Math.round(mayorTipo[1]/total*100):0;
  const porDia={};gs.forEach(g=>porDia[g.dia]=(porDia[g.dia]||0)+g.val);
  const diasOrd=Object.entries(porDia).sort((a,b)=>b[1]-a[1]);
  const mayorDia=diasOrd[0]||['-',0];
  let gMax={desc:'-',val:0};gs.forEach(g=>{if(g.val>gMax.val)gMax=g;});
  const du=new Set(gs.map(g=>g.dia)).size||1, prom=total/du;

  const P=[
    {q:'Cuanto gaste esta semana?',calc:\`En total se me fueron <span class="hl">\${fmt(total)}</span> durante la semana.\`},
  ];
  /* Si hubo ingresos, agregar una conclusion sobre ellos */
  if(totalIng>0){
    P.push({q:'Cuanto dinero me entro esta semana?',calc:\`Recibi <span class="hl">\${fmt(totalIng)}</span> en ingresos, lo que me dio un buen respiro.\`});
  }
  P.push(
    {q:'En que se me fue mas la plata?',calc:\`Sobre todo en <span class="hl">\${mayorTipo[0]}</span>: <span class="hl">\${fmt(mayorTipo[1])}</span>, casi \${pctMayor}% de todo lo que gaste.\`},
    {q:'Cual fue mi gasto mas grande de un solo golpe?',calc:\`Fue <span class="hl">\${gMax.desc}</span> con <span class="hl">\${fmt(gMax.val)}</span>. Vale la pena tenerlo presente.\`},
    {q:'Que dia se me fue mas dinero?',calc:\`El <span class="hl">\${NOM[mayorDia[0]]||mayorDia[0]}</span> fue el mas pesado, con <span class="hl">\${fmt(mayorDia[1])}</span> en gastos.\`},
    {q:'Cuanto gasto en un dia normal?',calc:\`En promedio unos <span class="hl">\${fmt(prom)}</span> al dia. Util para saber cuanto necesito tener a la mano.\`},
    {q:'Como termine la semana?',calc:\`Arranque con <span class="hl">\${fmt(saldoIni)}</span>\${totalIng>0?\`, me entraron <span class="hl">\${fmt(totalIng)}</span>\`:''} y termine con <span class="hl">\${fmt(saldoFin)}</span>.\${saldoFin>saldoIni?' Esta vez logre terminar con mas de lo que empece.':saldoFin<0?' Esta vez me pase del presupuesto.':''}\`},
    {q:'Donde podria recortar la proxima semana?',calc:\`Si quiero ahorrar, el primer lugar para mirar es <span class="hl">\${mayorTipo[0]}</span>, que es donde mas se me va.\`}
  );
  P.forEach((p,i)=>{
    const it=document.createElement('div');it.className='concl-item';
    it.innerHTML=\`<div class="concl-q"><span class="concl-num">\${i+1}.</span><span class="concl-qtext">\${p.q}</span></div><div class="concl-calc">\${p.calc}</div>\`;
    box.appendChild(it);
  });
}

}

/* ════ DESCIFRADO AES-256-GCM ════ */
const dec = new TextDecoder();
function fromB64(s){const bin=atob(s);const b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b;}

async function descifrar(password, paquete){
  const [saltB,ivB,dataB] = paquete.split('.');
  const salt=fromB64(saltB), iv=fromB64(ivB), data=fromB64(dataB);
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const plano=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
  return dec.decode(plano);
}

async function go(){
  const v=document.getElementById('p').value;
  if(!v)return;
  try{
    const datosJsTexto = await descifrar(v, DATOS_CIFRADOS);
    /* datosJsTexto es el contenido de datos.js: definimos window.DATOS al ejecutarlo */
    document.open();
    document.write(appHTML());
    document.close();
    /* Inyectar y ejecutar los datos descifrados, luego arrancar la app */
    setTimeout(()=>{
      const s=document.createElement('script');
      s.textContent = datosJsTexto + "\ntry{ iniciarApp(window.DATOS); }catch(e){ document.body.innerHTML='<p style=\"color:#ff4060;font-family:monospace;padding:40px\">Error al cargar los datos: '+e.message+'</p>'; }";
      document.body.appendChild(s);
    }, 60);
  }catch(e){
    const i=document.getElementById('p'),er=document.getElementById('em');
    i.classList.remove('err');void i.offsetWidth;i.classList.add('err');er.classList.add('on');
    i.value='';i.focus();setTimeout(()=>{i.classList.remove('err');er.classList.remove('on');},1800);
  }
}
document.getElementById('ok').addEventListener('click',go);
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
document.getElementById('ey').addEventListener('click',()=>{const i=document.getElementById('p');i.type=i.type==='password'?'text':'password';});
</script>
